name: Unit, Integration & E2E Black-Box-Tests

on:
  push:
    branches: [main, next]
    paths-ignore: ['**/*.md', '**/*.mdx', 'docs/**']
  pull_request:
    branches: [main, next]
    paths-ignore: ['**/*.md', '**/*.mdx', 'docs/**']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # 1. QUALITY GATE & BUILD
  # This job handles all DB-agnostic tasks in a single runner to reduce overhead.
  build:
    name: 🏗️ Quality Gate & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Types & Messages
        run: |
          bun run paraglide
          bun x svelte-kit sync

      - name: Lint & Type Check
        run: |
          bun run lint
          bun run check

      - name: Unit Tests
        env:
          TEST_MODE: true
          NODE_ENV: test
        run: bun run test:unit

      - name: Build Application
        run: bun run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v6
        with:
          name: build-artifact
          include-hidden-files: true
          path: |
            .svelte-kit/output
            build
            package.json
            bun.lock
            config
            src
            tests
            scripts
            project.inlang
            drizzle.config.ts
            tsconfig.json
            vite.config.ts
            svelte.config.js

  # 2. SETUP PLAYWRIGHT
  # Prime the browser cache once for the matrix.
  setup-browser:
    name: 🌐 Setup Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(bun x playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT
      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bun x playwright install --with-deps chromium

  # 3. DATABASE TEST MATRIX (Integration + E2E)
  # Consolidated matrix to run all DB-dependent tests in one leg per DB.
  database-tests:
    name: '🧪 Tests (${{ matrix.database }})'
    needs: [build, setup-browser]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        database: [mongodb, mariadb, postgresql, sqlite]

    services:
      db:
        image: ${{ matrix.database == 'mongodb' && 'mongo:latest' || matrix.database == 'mariadb' && 'mariadb:11' || matrix.database == 'postgresql' && 'postgres:16' || 'redis:alpine' }}
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: sveltycms_test
          MARIADB_USER: test
          MARIADB_PASSWORD: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sveltycms_test
        ports:
          - ${{ matrix.database == 'mongodb' && '27017:27017' || matrix.database == 'mariadb' && '3306:3306' || matrix.database == 'postgresql' && '5432:5432' || '6379:6379' }}
      mailhog:
        image: mailhog/mailhog
        ports:
          - '1025:1025'
          - '8025:8025'

    env:
      DB_TYPE: ${{ matrix.database }}
      TEST_MODE: 'true'
      API_BASE_URL: http://localhost:4173

    steps:
      - uses: oven-sh/setup-bun@v2
      - name: Download Build
        uses: actions/download-artifact@v6
        with:
          name: build-artifact

      - name: Install Runtime Deps
        run: bun install --frozen-lockfile --prefer-offline

      - name: Restore Playwright Cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-
          restore-keys: ${{ runner.os }}-playwright-

      - name: ⏳ Wait for Services
        run: |
          if [ "${{ matrix.database }}" == "mongodb" ]; then bun x wait-on tcp:127.0.0.1:27017; fi
          if [ "${{ matrix.database }}" == "mariadb" ]; then bun x wait-on tcp:127.0.0.1:3306; fi
          if [ "${{ matrix.database }}" == "postgresql" ]; then bun x wait-on tcp:127.0.0.1:5432; fi
          bun x wait-on tcp:127.0.0.1:1025
          sleep 5

      - name: 🔌 Run Integration Tests
        env:
          DB_HOST: 127.0.0.1
          DB_NAME: sveltycms_test
          DB_USER: ${{ (matrix.database == 'mariadb' || matrix.database == 'postgresql') && 'test' || '' }}
          DB_PASSWORD: ${{ (matrix.database == 'mariadb' || matrix.database == 'postgresql') && 'test' || '' }}
        run: bun run scripts/run-integration-tests.ts --filter="${{ matrix.database }}"

      - name: 🎭 Run E2E Tests (Playwright)
        # Skip E2E for SQLite if redundant, or run all.
        env:
          DB_HOST: 127.0.0.1
          DB_NAME: sveltycms_test
          DB_USER: ${{ (matrix.database == 'mariadb' || matrix.database == 'postgresql') && 'test' || '' }}
          DB_PASSWORD: ${{ (matrix.database == 'mariadb' || matrix.database == 'postgresql') && 'test' || '' }}
        run: |
          # The integration tests already started the preview server, but it's killed on cleanup.
          # We start it again for Playwright legs.
          bun run preview > preview.log 2>&1 &
          bun x wait-on http://localhost:4173/api/system/health --timeout 60000
          bun x playwright test tests/e2e --project=chromium
        timeout-minutes: 15

      - name: Upload Reports on Failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: reports-${{ matrix.database }}
          path: |
            playwright-report/
            preview.log
            tests/integration/results/
