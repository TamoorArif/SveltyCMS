<!doctype html>
<html lang="en" dir="ltr" class="dark svelty-loading">
  <head>
    <meta charset="utf-8" />
    <script nonce="%sveltekit.nonce%">
      "use strict";
      // Theme initialization (before page render to prevent flicker)
      const THEME_REGEX = /theme=(\w+)/;
      (() => {
        const c = document.cookie.match(THEME_REGEX)?.[1];
        const h = document.documentElement;

        try {
          // Determine if dark mode should be active
          const systemPrefersLight = matchMedia("(prefers-color-scheme: light)").matches;
          let isDark = true; // Default to dark mode

          if (c === "dark") {
            isDark = true;
          } else if (c === "light") {
            isDark = false;
          } else if (c === "system" || !c) {
            // Priority System: if system says light, use light. Otherwise default dark.
            isDark = !systemPrefersLight;
          }

          if (isDark) {
            h.classList.add("dark");
            h.classList.remove("light");
          } else {
            h.classList.add("light");
            h.classList.remove("dark");
          }
        } catch (e) {
          console.error("[SSR Script] Error:", e);
        }
      })();
    </script>
    <link rel="icon" href="%sveltekit.assets%/SveltyCMS_Logo.svg" />
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#5bbad5" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      /* Prevent initial white flash only during loading */
      html.svelty-loading,
      html.svelty-loading body {
        background-color: #0f172a !important;
      }
    </style>
    %sveltekit.head%
  </head>

  <body data-sveltekit-preload-data="hover" data-theme="sveltycms">
    <div
      id="svelty-splash"
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: #000000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition:
          opacity 0.15s ease-out,
          visibility 0.15s;
      "
    >
      <style>
        @keyframes svelty-pulse {
          0% {
            transform: scale(0.95);
            opacity: 0.7;
            filter: drop-shadow(0 0 0px rgba(59, 130, 246, 0.5));
          }
          50% {
            transform: scale(1);
            opacity: 1;
            filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.7));
          }
          100% {
            transform: scale(0.95);
            opacity: 0.7;
            filter: drop-shadow(0 0 0px rgba(59, 130, 246, 0.5));
          }
        }
        .svelty-logo-pulse {
          animation: svelty-pulse 1.2s infinite ease-in-out;
        }
      </style>
      <div class="svelty-logo-pulse">
        <img src="/SveltyCMS_Logo.svg" width="120" height="120" alt="SveltyCMS" />
      </div>
      <div
        style="
          margin-top: 2rem;
          color: white;
          font-family: sans-serif;
          font-size: 0.875rem;
          letter-spacing: 0.05em;
          text-transform: uppercase;
        "
      >
        Initializing System...
      </div>
    </div>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
