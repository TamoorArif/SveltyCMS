name: CI

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_CACHE_DIR: .bun-cache
  NODE_OPTIONS: "--no-warnings --no-deprecation"

jobs:
# --------------------------------
# 1. BOOTSTRAP (Validate Environment)
# --------------------------------
  bootstrap:
    name: 🏁 Bootstrap
    runs-on: ubuntu-latest
    outputs:
      pw-version: ${{ steps.pw.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Cache Bun
        uses: actions/cache@v5
        with:
          path: ${{ env.BUN_CACHE_DIR }}
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: mkdir -p ${{ env.BUN_CACHE_DIR }}
      - run: bun install --frozen-lockfile --cache-dir ${{ env.BUN_CACHE_DIR }}
      
      - name: Verify Codegen
        run: |
          bun run paraglide
          bun x svelte-kit sync
          mkdir -p config
          echo "export const privateEnv: Record<string, any> = {};" > config/private.test.ts

      - name: Get Playwright version
        id: pw
        run: echo "version=$(bun x playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Upload Workspace Meta
        uses: actions/upload-artifact@v6
        with:
          name: workspace-meta
          include-hidden-files: true
          path: |
            src/paraglide
            .svelte-kit
            config/private.test.ts

# --------------------------------
# 2. PARALLEL QUALITY GATES
# --------------------------------
  lint:
    name: 🔎 Lint
    needs: bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v6
        with:
          name: workspace-meta
      - uses: actions/cache@v5
        with:
          path: ${{ env.BUN_CACHE_DIR }}
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile --cache-dir ${{ env.BUN_CACHE_DIR }}
      - run: bun run lint
      - run: bun run check

  unit:
    name: ⚡ Unit
    needs: bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v6
        with:
          name: workspace-meta
      - uses: actions/cache@v5
        with:
          path: ${{ env.BUN_CACHE_DIR }}
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile --cache-dir ${{ env.BUN_CACHE_DIR }}
      - run: bun run test:unit --coverage
      - uses: codecov/codecov-action@v4
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: 🏗️ Build
    needs: bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v6
        with:
          name: workspace-meta
      - uses: actions/cache@v5
        with:
          path: ${{ env.BUN_CACHE_DIR }}
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile --cache-dir ${{ env.BUN_CACHE_DIR }}
      - run: bun run build
      - name: Upload Build
        uses: actions/upload-artifact@v6
        with:
          name: build-output
          include-hidden-files: true
          path: |
            .svelte-kit/output
            build

# --------------------------------
# 3. HEAVY TESTING (Blocked by Quality)
# --------------------------------
  db-tests:
    name: 🧪 DB (${{ matrix.db }})
    needs: [lint, unit, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [mongodb, mariadb, postgresql, sqlite]
    services:
      db:
        image: ${{ matrix.db == 'mongodb' && 'mongo:latest' || matrix.db == 'mariadb' && 'mariadb:11' || matrix.db == 'postgresql' && 'postgres:16' || 'redis:alpine' }}
        ports:
          - ${{ matrix.db == 'mongodb' && '27017:27017' || matrix.db == 'mariadb' && '3306:3306' || matrix.db == 'postgresql' && '5432:5432' || '6379:6379' }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v6
        with:
          name: workspace-meta
      - uses: actions/download-artifact@v6
        with:
          name: build-output
      - uses: actions/cache@v5
        with:
          path: ${{ env.BUN_CACHE_DIR }}
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile --cache-dir ${{ env.BUN_CACHE_DIR }}
      
      - name: Wait & Run
        env:
          DB_TYPE: ${{ matrix.db }}
          TEST_MODE: 'true'
        run: |
          if [ "${{ matrix.db }}" == "mongodb" ]; then bun x wait-on tcp:27017; fi
          if [ "${{ matrix.db }}" == "mariadb" ]; then bun x wait-on tcp:3306; fi
          if [ "${{ matrix.db }}" == "postgresql" ]; then bun x wait-on tcp:5432; fi
          bun run preview > preview.log 2>&1 &
          bun x wait-on http://localhost:4173/api/system/health
          bun run scripts/run-integration-tests.ts

  e2e:
    name: 🎭 E2E
    needs: [lint, unit, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v6
        with:
          name: workspace-meta
      - uses: actions/download-artifact@v6
        with:
          name: build-output
      - uses: actions/cache@v5
        with:
          path: ${{ env.BUN_CACHE_DIR }}
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile --cache-dir ${{ env.BUN_CACHE_DIR }}
      
      - name: Cache Playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ needs.bootstrap.outputs.pw-version }}

      - run: bun x playwright install --with-deps chromium
      - name: Run E2E
        run: |
          bun run preview > preview.log 2>&1 &
          bun x wait-on http://localhost:4173/api/system/health
          bun x playwright test --project=chromium
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report
          path: playwright-report
