name: CI

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Using a relative path within the workspace is more reliable for actions/cache
  BUN_CACHE_DIR: .bun-cache

jobs:
# --------------------------------
# PREPARE & BUILD
# --------------------------------
  prepare:
    name: 🏗️ Build & Prepare
    runs-on: ubuntu-latest
    outputs:
      pw-version: ${{ steps.pw.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      
      - name: Cache Bun packages
        uses: actions/cache@v5
        with:
          path: ${{ env.BUN_CACHE_DIR }}
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: mkdir -p ${{ env.BUN_CACHE_DIR }}
      - run: bun install --frozen-lockfile --cache-dir ${{ env.BUN_CACHE_DIR }}
      
      - run: bun run paraglide
      - run: bun x svelte-kit sync
      - run: bun run build

      - name: Get Playwright version
        id: pw
        run: echo "version=$(bun x playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v6
        with:
          name: build-output
          include-hidden-files: true
          path: |
            .svelte-kit
            build

# --------------------------------
# LINT & TYPECHECK
# --------------------------------
  lint:
    name: 🔎 Lint & Check
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      
      - name: Cache Bun packages
        uses: actions/cache@v5
        with:
          path: ${{ env.BUN_CACHE_DIR }}
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: mkdir -p ${{ env.BUN_CACHE_DIR }}
      - run: bun install --frozen-lockfile --cache-dir ${{ env.BUN_CACHE_DIR }}
      
      - run: bun run paraglide
      - run: bun x svelte-kit sync

      - name: Setup Dummy Config
        run: |
          mkdir -p config
          echo "export const privateEnv: Record<string, any> = {};" > config/private.test.ts

      - run: bun run lint
      - run: bun run check

# --------------------------------
# WHITEBOX UNIT TESTS
# --------------------------------
  unit:
    name: ⚡ Unit Tests
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      
      - name: Cache Bun packages
        uses: actions/cache@v5
        with:
          path: ${{ env.BUN_CACHE_DIR }}
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: mkdir -p ${{ env.BUN_CACHE_DIR }}
      - run: bun install --frozen-lockfile --cache-dir ${{ env.BUN_CACHE_DIR }}
      
      - run: bun run paraglide
      - run: bun x svelte-kit sync

      - name: Setup Dummy Config
        run: |
          mkdir -p config
          echo "export const privateEnv: Record<string, any> = {};" > config/private.test.ts

      - name: Run unit tests
        env:
          TEST_MODE: true
        run: bun run test:unit --coverage

      - name: Upload Coverage
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

# --------------------------------
# DATABASE TESTS
# --------------------------------
  db-tests:
    name: 🧪 DB (${{ matrix.db }})
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [mongodb, mariadb, postgresql, sqlite]
    services:
      db:
        image: ${{ matrix.db == 'mongodb' && 'mongo:latest' || matrix.db == 'mariadb' && 'mariadb:11' || matrix.db == 'postgresql' && 'postgres:16' || 'redis:alpine' }}
        ports:
          - ${{ matrix.db == 'mongodb' && '27017:27017' || matrix.db == 'mariadb' && '3306:3306' || matrix.db == 'postgresql' && '5432:5432' || '6379:6379' }}
      mailhog:
        image: mailhog/mailhog
        ports:
          - '1025:1025'
          - '8025:8025'
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      
      - name: Cache Bun packages
        uses: actions/cache@v5
        with:
          path: ${{ env.BUN_CACHE_DIR }}
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: mkdir -p ${{ env.BUN_CACHE_DIR }}
      - run: bun install --frozen-lockfile --cache-dir ${{ env.BUN_CACHE_DIR }}
      
      - uses: actions/download-artifact@v6
        with:
          name: build-output

      - run: bun run paraglide
      - run: bun x svelte-kit sync

      - name: Setup Dummy Config
        run: |
          mkdir -p config
          echo "export const privateEnv: Record<string, any> = {};" > config/private.test.ts

      - name: Wait for Services
        run: |
          if [ "${{ matrix.db }}" == "mongodb" ]; then bun x wait-on tcp:27017; fi
          if [ "${{ matrix.db }}" == "mariadb" ]; then bun x wait-on tcp:3306; fi
          if [ "${{ matrix.db }}" == "postgresql" ]; then bun x wait-on tcp:5432; fi
          bun x wait-on tcp:1025

      - name: Start server
        run: |
          bun run preview > preview.log 2>&1 &
          bun x wait-on http://localhost:4173/api/system/health --timeout 60000

      - name: Run tests
        env:
          DB_TYPE: ${{ matrix.db }}
          TEST_MODE: 'true'
        run: bun run scripts/run-integration-tests.ts

# --------------------------------
# E2E TESTS (SINGLE BROWSER)
# --------------------------------
  e2e:
    name: 🎭 E2E
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      
      - name: Cache Bun packages
        uses: actions/cache@v5
        with:
          path: ${{ env.BUN_CACHE_DIR }}
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: mkdir -p ${{ env.BUN_CACHE_DIR }}
      - run: bun install --frozen-lockfile --cache-dir ${{ env.BUN_CACHE_DIR }}
      
      - uses: actions/download-artifact@v6
        with:
          name: build-output

      - run: bun run paraglide
      - run: bun x svelte-kit sync

      - name: Cache Playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ needs.prepare.outputs.pw-version }}

      - name: Install browser
        run: bun x playwright install --with-deps chromium

      - name: Setup Dummy Config
        run: |
          mkdir -p config
          echo "export const privateEnv: Record<string, any> = {};" > config/private.test.ts

      - name: Start server
        run: |
          bun run preview > preview.log 2>&1 &
          bun x wait-on http://localhost:4173/api/system/health --timeout 60000

      - name: Run Playwright
        run: bun x playwright test --project=chromium

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report
          path: playwright-report
