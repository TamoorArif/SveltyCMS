name: Unit, Integration & E2E Black-Box-Tests

on:
  push:
    branches: [main, next]
    paths-ignore: ['**/*.md', '**/*.mdx', 'docs/**']
  pull_request:
    branches: [main, next]
    paths-ignore: ['**/*.md', '**/*.mdx', 'docs/**']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  setup:
    name: 🏗️ Setup & Environment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(bun x playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT
      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bun x playwright install --with-deps chromium
      - name: Sync SvelteKit
        run: |
          bun x svelte-kit sync
          rm -rf .svelte-kit/types
          bun x svelte-kit sync
      - name: Compile Paraglide
        run: bun run paraglide
      - name: Generate Config Stubs
        run: |
          mkdir -p config
          echo "export const privateEnv: any = {
            DB_TYPE: process.env.DB_TYPE || '',
            DB_HOST: process.env.DB_HOST || '127.0.0.1',
            DB_PORT: process.env.DB_PORT || '27017',
            DB_NAME: process.env.DB_NAME || 'sveltycms_test',
            DB_USER: process.env.DB_USER || 'test',
            DB_PASSWORD: process.env.DB_PASSWORD || 'test'
          }" > config/private.test.ts
      - name: Upload Workspace
        uses: actions/upload-artifact@v6
        with:
          name: workspace
          include-hidden-files: true
          path: |
            .
            !.git
            !node_modules

  unit-tests:
    name: ⚡ Unit Tests
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: oven-sh/setup-bun@v2
      - name: Download Workspace
        uses: actions/download-artifact@v6
        with:
          name: workspace
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run Linter
        run: bun run lint
      - name: Run Type Check
        run: bun run check
      - name: Run Unit Tests
        env:
          TEST_MODE: true
          NODE_ENV: test
        run: bun run test:unit

  build:
    name: 🏗️ Production Build
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: oven-sh/setup-bun@v2
      - name: Download Workspace
        uses: actions/download-artifact@v6
        with:
          name: workspace
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v6
        with:
          name: build-artifact
          include-hidden-files: true
          path: |
            .svelte-kit/output
            build
            package.json
            bun.lock
            config
            src
            tests
            scripts
            project.inlang
            drizzle.config.ts
            tsconfig.json
            vite.config.ts
            svelte.config.js

  integration:
    name: '🔌 Integration (${{ matrix.database }})'
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        database: [mongodb, mariadb, postgresql, sqlite]

    services:
      db:
        image: ${{ matrix.database == 'mongodb' && 'mongo:latest' || matrix.database == 'mariadb' && 'mariadb:11' || matrix.database == 'postgresql' && 'postgres:16' || 'redis:alpine' }}
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: sveltycms_test
          MARIADB_USER: test
          MARIADB_PASSWORD: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sveltycms_test
        ports:
          - ${{ matrix.database == 'mongodb' && '27017:27017' || matrix.database == 'mariadb' && '3306:3306' || matrix.database == 'postgresql' && '5432:5432' || '6379:6379' }}
      mailhog:
        image: mailhog/mailhog
        ports:
          - '1025:1025'
          - '8025:8025'

    env:
      DB_TYPE: ${{ matrix.database }}
      TEST_MODE: 'true'
      API_BASE_URL: http://localhost:4173

    steps:
      - uses: oven-sh/setup-bun@v2
      - name: Download Build
        uses: actions/download-artifact@v6
        with:
          name: build-artifact
      - name: Install Runtime Deps
        run: bun install --frozen-lockfile
      - name: ⏳ Wait for Services
        run: |
          if [ "${{ matrix.database }}" == "mongodb" ]; then bun x wait-on tcp:127.0.0.1:27017; fi
          if [ "${{ matrix.database }}" == "mariadb" ]; then bun x wait-on tcp:127.0.0.1:3306; fi
          if [ "${{ matrix.database }}" == "postgresql" ]; then bun x wait-on tcp:127.0.0.1:5432; fi
          bun x wait-on tcp:127.0.0.1:1025
          sleep 10
      - name: 🧪 Run Integration Tests
        env:
          DB_TYPE: ${{ matrix.database }}
          DB_HOST: 127.0.0.1
          DB_NAME: sveltycms_test
          DB_USER: ${{ (matrix.database == 'mariadb' || matrix.database == 'postgresql') && 'test' || '' }}
          DB_PASSWORD: ${{ (matrix.database == 'mariadb' || matrix.database == 'postgresql') && 'test' || '' }}
          TEST_MODE: true
        run: bun run scripts/run-integration-tests.ts
        timeout-minutes: 15

  e2e:
    name: '🎭 E2E (${{ matrix.database }})'
    needs: [build, setup]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        database: [mongodb, sqlite, mariadb, postgresql]

    services:
      db:
        image: ${{ matrix.database == 'mongodb' && 'mongo:latest' || matrix.database == 'mariadb' && 'mariadb:11' || matrix.database == 'postgresql' && 'postgres:16' || 'redis:alpine' }}
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: sveltycms_test
          MARIADB_USER: test
          MARIADB_PASSWORD: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sveltycms_test
        ports:
          - ${{ matrix.database == 'mongodb' && '27017:27017' || matrix.database == 'mariadb' && '3306:3306' || matrix.database == 'postgresql' && '5432:5432' || '6379:6379' }}
      mailhog:
        image: mailhog/mailhog
        ports:
          - '1025:1025'
          - '8025:8025'

    steps:
      - uses: oven-sh/setup-bun@v2
      - name: Download Build
        uses: actions/download-artifact@v6
        with:
          name: build-artifact
      - name: Install Runtime Deps
        run: bun install --frozen-lockfile
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(bun x playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT
      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright Browsers
        run: bun x playwright install --with-deps chromium
      - name: ⏳ Wait for Services
        run: |
          if [ "${{ matrix.database }}" == "mongodb" ]; then bun x wait-on tcp:127.0.0.1:27017; fi
          if [ "${{ matrix.database }}" == "mariadb" ]; then bun x wait-on tcp:127.0.0.1:3306; fi
          if [ "${{ matrix.database }}" == "postgresql" ]; then bun x wait-on tcp:127.0.0.1:5432; fi
          bun x wait-on tcp:127.0.0.1:1025
          sleep 10
      - name: 🎭 Run Playwright E2E
        env:
          DB_TYPE: ${{ matrix.database }}
          DB_HOST: 127.0.0.1
          DB_NAME: sveltycms_test
          DB_USER: ${{ (matrix.database == 'mariadb' || matrix.database == 'postgresql') && 'test' || '' }}
          DB_PASSWORD: ${{ (matrix.database == 'mariadb' || matrix.database == 'postgresql') && 'test' || '' }}
          TEST_MODE: true
        run: |
          bun run preview > preview.log 2>&1 &
          bun x wait-on http://localhost:4173/api/system/health --timeout 60000
          bun x playwright test tests/e2e/setup-wizard.spec.ts --project=chromium
          bun x playwright test tests/e2e/role-based-access.spec.ts --project=chromium
        timeout-minutes: 20
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report-${{ matrix.database }}
          path: playwright-report/
          retention-days: 14
      - name: Upload Server Logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: preview-logs-${{ matrix.database }}
          path: preview.log
          retention-days: 7
